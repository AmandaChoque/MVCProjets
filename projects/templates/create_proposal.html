{% extends 'base.html' %} {% block content %}
<main class="container-fluid px-5 py-4">
  <!-- ENCABEZADO -->
  <div class="mb-4">
    <h4 class="fw-semibold mb-1">Propuestas</h4>
    <span class="text-muted">Nueva propuesta</span>
  </div>

  <!-- TARJETA -->
  <div class="card border-0 shadow-sm rounded-3">
    <div class="card-body p-4">
      <form
        action="{% url 'create_proposal' %}"
        method="POST"
        enctype="multipart/form-data"
      >
        {% csrf_token %}

        <div class="row g-4">
          <!-- COLUMNA IZQUIERDA -->
          <div class="col-lg-6">
            <div class="mb-3">
              <label class="form-label"
                >Fecha de Presentación <span class="text-danger">*</span></label
              >
              {{ form.fecha_presentacion }}
            </div>

            <div class="mb-3">
              <label class="form-label"
                >Monto Presupuestado <span class="text-danger">*</span></label
              >
              {{ form.monto_presupuesto }}
            </div>

            <div class="mb-3">
              <label class="form-label"
                >Entidad Pública <span class="text-danger">*</span></label
              >
              {{ form.entidad_publica }}
            </div>
          </div>

          <!-- COLUMNA DERECHA -->
          <div class="col-lg-6">
            <div class="mb-3">
              <label class="form-label">Requisitos</label>
              {{ form.requisitos }}
            </div>
          </div>
        </div>

        <div class="text-muted small mt-2 mb-3">
          <span class="text-danger">*</span> Campos obligatorios
        </div>

        {% if error %}
        <div class="alert alert-danger mt-3">{{ error }}</div>
        {% endif %}

        <!-- BOTÓN -->
        <div class="d-flex justify-content-end mt-4">
          <button class="btn btn-primary px-4">Guardar propuesta</button>
        </div>
      </form>
    </div>
  </div>
</main>
{% endblock %}
